name: Docker Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  docker:
    name: Bump Version And Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ensure release runs from default branch
        run: |
          if [ "$GITHUB_REF_NAME" != "${{ github.event.repository.default_branch }}" ]; then
            echo "This workflow must run from ${{ github.event.repository.default_branch }}."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ve-xchange-api:v${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/ve-xchange-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push release tag
        run: git push origin "v${{ steps.version.outputs.version }}"
